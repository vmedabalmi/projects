<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

// ============ CONSTANTS ============
const PLAYER_SPEED = 3.5;
const PLAYER_RADIUS = 16;
const PLAYER_MAX_HP = 100;
const BULLET_SPEED = 8;
const ENEMY_BULLET_SPEED = 4;
const FIRE_RATE = 150; // ms between shots
const PARTICLE_COUNT = 8;

// ============ INPUT ============
const keys = {};
const mouse = { x: canvas.width / 2, y: canvas.height / 2, down: false };
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; keys[e.code] = false; });
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ============ GAME STATE ============
let gameState = 'menu'; // menu, playing, levelComplete, gameOver, win
let level = 1;
let score = 0;
let screenShake = 0;
let levelTimer = 0;
let spawnTimer = 0;
let enemiesRemaining = 0;
let enemiesSpawned = 0;
let enemiesToSpawn = 0;
let lastFireTime = 0;

const player = { x: 0, y: 0, hp: PLAYER_MAX_HP, angle: 0, invulnTimer: 0, animTimer: 0 };
let bullets = [];
let enemies = [];
let particles = [];

// ============ LEVEL DEFINITIONS ============
const levels = [
    null, // index 0 unused
    { total: 5, types: ['grunt'], spawnRate: 1500, label: 'Level 1 - The Beginning' },
    { total: 8, types: ['grunt', 'grunt', 'scout'], spawnRate: 1200, label: 'Level 2 - Scout Alert' },
    { total: 12, types: ['grunt', 'scout', 'tank'], spawnRate: 1000, label: 'Level 3 - Heavy Armor' },
    { total: 16, types: ['grunt', 'scout', 'scout', 'tank', 'tank'], spawnRate: 800, label: 'Level 4 - Onslaught' },
    { total: 20, types: ['grunt', 'scout', 'tank', 'tank', 'boss'], spawnRate: 700, label: 'Level 5 - Final Stand' },
];

// ============ ENEMY STATS ============
const enemyDefs = {
    grunt:  { hp: 30,  speed: 1.2, radius: 14, fireRate: 2000, color: '#4a4', bulletSize: 3, damage: 8,  score: 100, accuracy: 0.15 },
    scout:  { hp: 20,  speed: 2.5, radius: 12, fireRate: 1200, color: '#cc4', bulletSize: 3, damage: 5,  score: 150, accuracy: 0.3 },
    tank:   { hp: 80,  speed: 0.7, radius: 20, fireRate: 2500, color: '#c44', bulletSize: 5, damage: 15, score: 250, accuracy: 0.05 },
    boss:   { hp: 250, speed: 0.5, radius: 30, fireRate: 600,  color: '#c0f', bulletSize: 6, damage: 12, score: 1000, accuracy: 0.1 },
};

// ============ HELPERS ============
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function angleTo(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(1, 4);
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(15, 35),
            maxLife: 35,
            color,
            size: rand(2, 5),
        });
    }
}

function spawnEnemy() {
    const def = levels[level];
    if (enemiesSpawned >= def.total) return;

    const type = def.types[randInt(0, def.types.length - 1)];
    const stats = enemyDefs[type];
    let x, y;
    const side = randInt(0, 3);
    if (side === 0) { x = rand(0, canvas.width); y = -40; }
    else if (side === 1) { x = canvas.width + 40; y = rand(0, canvas.height); }
    else if (side === 2) { x = rand(0, canvas.width); y = canvas.height + 40; }
    else { x = -40; y = rand(0, canvas.height); }

    enemies.push({
        x, y, type,
        hp: stats.hp,
        maxHp: stats.hp,
        speed: stats.speed,
        radius: stats.radius,
        fireRate: stats.fireRate,
        color: stats.color,
        bulletSize: stats.bulletSize,
        damage: stats.damage,
        scoreVal: stats.score,
        accuracy: stats.accuracy,
        lastFire: 0,
        angle: 0,
        animTimer: rand(0, 100),
    });
    enemiesSpawned++;
}

// ============ INIT LEVEL ============
function startLevel(lvl) {
    level = lvl;
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    player.hp = PLAYER_MAX_HP;
    player.invulnTimer = 0;
    bullets = [];
    enemies = [];
    particles = [];
    enemiesSpawned = 0;
    enemiesToSpawn = levels[lvl].total;
    enemiesRemaining = levels[lvl].total;
    spawnTimer = 0;
    levelTimer = 0;
    gameState = 'playing';
}

// ============ UPDATE ============
function update(dt) {
    if (gameState !== 'playing') return;

    levelTimer += dt;
    player.animTimer += dt;

    // Player movement
    let dx = 0, dy = 0;
    if (keys['arrowleft'] || keys['a'] || keys['ArrowLeft']) dx -= 1;
    if (keys['arrowright'] || keys['d'] || keys['ArrowRight']) dx += 1;
    if (keys['arrowup'] || keys['w'] || keys['ArrowUp']) dy -= 1;
    if (keys['arrowdown'] || keys['s'] || keys['ArrowDown']) dy += 1;
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    player.x = clamp(player.x + dx * PLAYER_SPEED, PLAYER_RADIUS, canvas.width - PLAYER_RADIUS);
    player.y = clamp(player.y + dy * PLAYER_SPEED, PLAYER_RADIUS, canvas.height - PLAYER_RADIUS);
    player.angle = angleTo(player, mouse);

    // Player invulnerability
    if (player.invulnTimer > 0) player.invulnTimer -= dt;

    // Player shooting
    if (mouse.down && Date.now() - lastFireTime > FIRE_RATE) {
        lastFireTime = Date.now();
        const gunTipX = player.x + Math.cos(player.angle) * 22;
        const gunTipY = player.y + Math.sin(player.angle) * 22;
        bullets.push({
            x: gunTipX, y: gunTipY,
            vx: Math.cos(player.angle) * BULLET_SPEED,
            vy: Math.sin(player.angle) * BULLET_SPEED,
            owner: 'player',
            size: 3,
            damage: 15,
            life: 120,
        });
        spawnParticles(gunTipX, gunTipY, '#ff0', 3);
    }

    // Spawn enemies
    spawnTimer += dt;
    if (enemiesSpawned < enemiesToSpawn && spawnTimer > levels[level].spawnRate / 16.67) {
        spawnTimer = 0;
        spawnEnemy();
    }

    // Update enemies
    for (const e of enemies) {
        e.animTimer += dt;
        const d = dist(e, player);
        e.angle = angleTo(e, player);

        // Move toward player but stop at range
        const stopDist = e.type === 'boss' ? 200 : 150;
        if (d > stopDist) {
            e.x += Math.cos(e.angle) * e.speed;
            e.y += Math.sin(e.angle) * e.speed;
        } else {
            // Strafe slightly
            const strafe = Math.sin(e.animTimer * 0.05) * e.speed * 0.5;
            e.x += Math.cos(e.angle + Math.PI / 2) * strafe;
            e.y += Math.sin(e.angle + Math.PI / 2) * strafe;
        }

        // Keep on screen
        e.x = clamp(e.x, e.radius, canvas.width - e.radius);
        e.y = clamp(e.y, e.radius, canvas.height - e.radius);

        // Enemy shooting
        e.lastFire += dt;
        const fireThreshold = e.fireRate / 16.67;
        if (e.lastFire > fireThreshold && d < 500) {
            e.lastFire = 0;
            const spread = (Math.random() - 0.5) * e.accuracy;
            const shootAngle = e.angle + spread;
            bullets.push({
                x: e.x + Math.cos(shootAngle) * (e.radius + 5),
                y: e.y + Math.sin(shootAngle) * (e.radius + 5),
                vx: Math.cos(shootAngle) * ENEMY_BULLET_SPEED,
                vy: Math.sin(shootAngle) * ENEMY_BULLET_SPEED,
                owner: 'enemy',
                size: e.bulletSize,
                damage: e.damage,
                life: 180,
                color: e.color,
            });
        }
    }

    // Update bullets
    for (const b of bullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        if (b.owner === 'player') {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (dist(b, e) < e.radius + b.size) {
                    e.hp -= b.damage;
                    b.life = 0;
                    spawnParticles(b.x, b.y, '#fff', 4);
                    if (e.hp <= 0) {
                        spawnParticles(e.x, e.y, e.color, PARTICLE_COUNT * 2);
                        score += e.scoreVal;
                        enemies.splice(i, 1);
                        enemiesRemaining--;
                    }
                    break;
                }
            }
        } else if (b.owner === 'enemy' && player.invulnTimer <= 0) {
            if (dist(b, player) < PLAYER_RADIUS + b.size) {
                player.hp -= b.damage;
                player.invulnTimer = 30; // ~0.5 seconds
                b.life = 0;
                screenShake = 8;
                spawnParticles(player.x, player.y, '#f44', 6);
                if (player.hp <= 0) {
                    player.hp = 0;
                    spawnParticles(player.x, player.y, '#f80', 20);
                    gameState = 'gameOver';
                }
            }
        }
    }
    bullets = bullets.filter(b => b.life > 0 && b.x > -50 && b.x < canvas.width + 50 && b.y > -50 && b.y < canvas.height + 50);

    // Update particles
    for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.life--;
    }
    particles = particles.filter(p => p.life > 0);

    // Screen shake decay
    if (screenShake > 0) screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;

    // Level complete check
    if (enemiesRemaining <= 0 && enemiesSpawned >= enemiesToSpawn) {
        if (level >= 5) {
            gameState = 'win';
        } else {
            gameState = 'levelComplete';
        }
    }
}

// ============ DRAWING ============
function drawPlayer() {
    const { x, y, angle, hp, invulnTimer, animTimer } = player;
    if (invulnTimer > 0 && Math.floor(invulnTimer) % 4 < 2) return; // blink

    ctx.save();
    ctx.translate(x, y);

    // Body
    const bobY = Math.sin(animTimer * 0.15) * 1.5;
    ctx.save();
    ctx.translate(0, bobY);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 12, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Feet (animate when moving)
    const moving = keys['arrowleft'] || keys['arrowright'] || keys['arrowup'] || keys['arrowdown'] ||
                   keys['a'] || keys['d'] || keys['w'] || keys['s'] ||
                   keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown'];
    const footOffset = moving ? Math.sin(animTimer * 0.3) * 4 : 0;
    ctx.fillStyle = '#446';
    ctx.fillRect(-8, 4 + footOffset, 5, 8);
    ctx.fillRect(3, 4 - footOffset, 5, 8);

    // Body
    ctx.fillStyle = '#68f';
    ctx.fillRect(-10, -10, 20, 18);
    // Body highlight
    ctx.fillStyle = '#8af';
    ctx.fillRect(-8, -8, 6, 14);

    // Head
    ctx.fillStyle = '#fda';
    ctx.fillRect(-6, -18, 12, 10);
    // Eyes
    ctx.fillStyle = '#222';
    ctx.fillRect(-4, -15, 3, 3);
    ctx.fillRect(1, -15, 3, 3);
    // Headband
    ctx.fillStyle = '#f44';
    ctx.fillRect(-7, -18, 14, 3);

    ctx.restore();

    // Gun arm (rotates with mouse)
    ctx.rotate(angle);
    ctx.fillStyle = '#fda';
    ctx.fillRect(4, -3, 10, 6); // arm
    ctx.fillStyle = '#666';
    ctx.fillRect(14, -2, 10, 4); // gun barrel
    ctx.fillStyle = '#888';
    ctx.fillRect(12, -4, 6, 8); // gun body

    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);

    const bob = Math.sin(e.animTimer * 0.12) * 2;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, e.radius, e.radius * 0.8, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(0, bob);

    const r = e.radius;
    if (e.type === 'grunt') {
        // Grunt - blocky soldier
        ctx.fillStyle = '#2a2';
        ctx.fillRect(-r, -r, r * 2, r * 2);
        ctx.fillStyle = '#4c4';
        ctx.fillRect(-r + 2, -r + 2, r - 2, r * 2 - 4);
        // Helmet
        ctx.fillStyle = '#383';
        ctx.fillRect(-r + 1, -r, r * 2 - 2, 6);
        // Eyes
        ctx.fillStyle = '#f00';
        ctx.fillRect(-4, -r + 7, 3, 3);
        ctx.fillRect(2, -r + 7, 3, 3);
    } else if (e.type === 'scout') {
        // Scout - smaller, triangular
        ctx.fillStyle = '#cc4';
        ctx.beginPath();
        ctx.moveTo(0, -r);
        ctx.lineTo(r, r);
        ctx.lineTo(-r, r);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ee6';
        ctx.beginPath();
        ctx.moveTo(0, -r + 4);
        ctx.lineTo(r - 4, r - 2);
        ctx.lineTo(-r + 4, r - 2);
        ctx.closePath();
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#f00';
        ctx.fillRect(-4, -2, 3, 3);
        ctx.fillRect(2, -2, 3, 3);
    } else if (e.type === 'tank') {
        // Tank - big circle with armor
        ctx.fillStyle = '#a22';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#c44';
        ctx.beginPath();
        ctx.arc(0, 0, r - 4, 0, Math.PI * 2);
        ctx.fill();
        // Armor plates
        ctx.strokeStyle = '#822';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r - 2, 0, Math.PI * 0.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, r - 2, Math.PI, Math.PI * 1.5);
        ctx.stroke();
        // Eyes
        ctx.fillStyle = '#ff0';
        ctx.fillRect(-6, -4, 4, 4);
        ctx.fillRect(2, -4, 4, 4);
    } else if (e.type === 'boss') {
        // Boss - large spiky
        ctx.fillStyle = '#808';
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2 + e.animTimer * 0.02;
            const outerR = r + 6;
            const innerR = r - 4;
            const ra = i % 2 === 0 ? outerR : innerR;
            if (i === 0) ctx.moveTo(Math.cos(a) * ra, Math.sin(a) * ra);
            else ctx.lineTo(Math.cos(a) * ra, Math.sin(a) * ra);
        }
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#c0f';
        ctx.beginPath();
        ctx.arc(0, 0, r - 6, 0, Math.PI * 2);
        ctx.fill();
        // Eyes (3)
        ctx.fillStyle = '#f00';
        ctx.fillRect(-10, -6, 5, 5);
        ctx.fillRect(-2, -8, 5, 5);
        ctx.fillRect(6, -6, 5, 5);
        // Mouth
        ctx.fillStyle = '#f00';
        ctx.fillRect(-8, 4, 16, 4);
    }

    ctx.restore();

    // Gun pointing at player
    ctx.rotate(e.angle);
    ctx.fillStyle = '#555';
    ctx.fillRect(r - 4, -2, 12, 4);

    // HP bar
    ctx.rotate(-e.angle);
    if (e.hp < e.maxHp) {
        const barW = r * 2;
        const barH = 4;
        const barY = -r - 10;
        ctx.fillStyle = '#400';
        ctx.fillRect(-barW / 2, barY, barW, barH);
        ctx.fillStyle = '#f44';
        ctx.fillRect(-barW / 2, barY, barW * (e.hp / e.maxHp), barH);
    }

    ctx.restore();
}

function drawBullet(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    const angle = Math.atan2(b.vy, b.vx);
    ctx.rotate(angle);

    if (b.owner === 'player') {
        // Yellow bullet with glow
        ctx.fillStyle = '#ff0';
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 6;
        ctx.fillRect(-4, -1.5, 8, 3);
        ctx.shadowBlur = 0;
    } else {
        ctx.fillStyle = b.color || '#f44';
        ctx.shadowColor = b.color || '#f44';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(0, 0, b.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    ctx.restore();
}

function drawParticle(p) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.globalAlpha = 1;
}

function drawHUD() {
    // Health bar
    const hpW = 200, hpH = 20, hpX = 20, hpY = 20;
    ctx.fillStyle = '#400';
    ctx.fillRect(hpX, hpY, hpW, hpH);
    const hpRatio = player.hp / PLAYER_MAX_HP;
    ctx.fillStyle = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(hpX, hpY, hpW * hpRatio, hpH);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('HP', hpX + 4, hpY + 15);

    // Level
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('LEVEL ' + level, canvas.width / 2, 35);
    ctx.textAlign = 'left';

    // Enemies remaining
    ctx.textAlign = 'right';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#f88';
    ctx.fillText('ENEMIES: ' + enemiesRemaining, canvas.width - 20, 30);
    ctx.fillStyle = '#ff0';
    ctx.fillText('SCORE: ' + score, canvas.width - 20, 50);
    ctx.textAlign = 'left';
}

function drawFloor() {
    // Grid pattern
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    const gridSize = 50;
    const offX = player.x * 0.1 % gridSize;
    const offY = player.y * 0.1 % gridSize;
    for (let x = -gridSize + offX; x < canvas.width + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = -gridSize + offY; y < canvas.height + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

function drawScreen(title, subtitle, hint) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 40);

    if (subtitle) {
        ctx.font = '24px monospace';
        ctx.fillStyle = '#aaa';
        ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 10);
    }

    ctx.font = '18px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText(hint || 'Click to continue', canvas.width / 2, canvas.height / 2 + 60);
    ctx.textAlign = 'left';
}

// ============ RENDER ============
function render() {
    ctx.save();

    // Screen shake
    if (screenShake > 0) {
        ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
    }

    // Background
    ctx.fillStyle = '#111122';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawFloor();

    if (gameState === 'menu') {
        ctx.fillStyle = '#111122';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawFloor();

        ctx.textAlign = 'center';
        ctx.fillStyle = '#f44';
        ctx.font = 'bold 64px monospace';
        ctx.fillText('RETRO SHOOTER', canvas.width / 2, canvas.height / 2 - 80);

        ctx.fillStyle = '#fff';
        ctx.font = '20px monospace';
        ctx.fillText('Arrow Keys / WASD to move', canvas.width / 2, canvas.height / 2);
        ctx.fillText('Mouse to aim, Click to shoot', canvas.width / 2, canvas.height / 2 + 30);
        ctx.fillText('Survive 5 levels!', canvas.width / 2, canvas.height / 2 + 60);

        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 24px monospace';
        ctx.fillText('Click to Start', canvas.width / 2, canvas.height / 2 + 120);
        ctx.textAlign = 'left';

    } else if (gameState === 'playing') {
        for (const p of particles) drawParticle(p);
        for (const b of bullets) drawBullet(b);
        for (const e of enemies) drawEnemy(e);
        drawPlayer();
        drawHUD();

    } else if (gameState === 'levelComplete') {
        for (const p of particles) drawParticle(p);
        drawPlayer();
        drawHUD();
        drawScreen(
            'LEVEL ' + level + ' COMPLETE!',
            'Score: ' + score,
            'Click to start Level ' + (level + 1)
        );

    } else if (gameState === 'gameOver') {
        for (const p of particles) drawParticle(p);
        for (const e of enemies) drawEnemy(e);
        drawHUD();
        drawScreen('GAME OVER', 'Final Score: ' + score, 'Click to restart');

    } else if (gameState === 'win') {
        for (const p of particles) drawParticle(p);
        drawPlayer();
        drawHUD();
        drawScreen('YOU WIN!', 'Final Score: ' + score, 'Click to play again');
    }

    ctx.restore();
}

// ============ CLICK HANDLER FOR MENUS ============
canvas.addEventListener('click', () => {
    if (gameState === 'menu') {
        score = 0;
        startLevel(1);
    } else if (gameState === 'levelComplete') {
        startLevel(level + 1);
    } else if (gameState === 'gameOver' || gameState === 'win') {
        score = 0;
        level = 1;
        gameState = 'menu';
    }
});

// ============ GAME LOOP ============
let lastTime = performance.now();
function loop(time) {
    const dt = (time - lastTime) / 16.67; // normalize to ~60fps
    lastTime = time;
    update(clamp(dt, 0, 3)); // cap dt to prevent spiral
    render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
